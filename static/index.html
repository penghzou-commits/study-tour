<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研学管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
                        sidebar: '#1e293b',
                        'sidebar-hover': '#334155',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="flex min-h-screen">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="w-64 bg-sidebar text-white flex-shrink-0 fixed h-full z-30 transition-transform duration-300">
            <div class="p-5 border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary-500 rounded-lg flex items-center justify-center">
                        <i class="ri-book-open-line text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold">研学管理后台</h1>
                        <p class="text-xs text-gray-400">Study Tour Management</p>
                    </div>
                </div>
            </div>
            <nav id="nav-menu" class="py-4 overflow-y-auto" style="height: calc(100vh - 88px);"></nav>
        </aside>

        <!-- 主内容区 -->
        <div class="flex-1 ml-64">
            <!-- 顶部栏 -->
            <header class="bg-white shadow-sm sticky top-0 z-20 px-6 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button id="toggle-sidebar" class="p-2 rounded-lg hover:bg-gray-100 lg:hidden">
                        <i class="ri-menu-line text-xl"></i>
                    </button>
                    <div id="breadcrumb" class="text-sm text-gray-500"></div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <button class="p-2 rounded-lg hover:bg-gray-100 relative">
                            <i class="ri-notification-3-line text-xl text-gray-600"></i>
                            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                    </div>
                    <div id="user-info" class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 rounded-lg px-3 py-1.5">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);box-shadow:0 2px 8px rgba(59,130,246,0.3);border:2px solid #e0e7ff;">
                            <i class="ri-user-line text-white" style="font-size:16px;"></i>
                        </div>
                        <span class="text-sm text-gray-700 font-medium">清风</span>
                    </div>
                </div>
            </header>

            <!-- 页面内容 -->
            <main id="main-content" class="p-6"></main>

            <!-- 页脚 -->
            <footer class="text-center py-4 text-sm text-gray-400 border-t border-gray-100">
                <p>由 <a href="https://with.woa.com/" style="color: #8A2BE2;" target="_blank">With</a> 通过自然语言生成</p>
            </footer>
        </div>
    </div>

    <!-- 模态框容器 -->
    <div id="modal-container"></div>

    <!-- Toast容器 -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
