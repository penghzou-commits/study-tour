<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研学管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
                        success: { 50:'#f0fdf4',500:'#22c55e',600:'#16a34a' },
                        warning: { 50:'#fffbeb',500:'#f59e0b',600:'#d97706' },
                        danger: { 50:'#fef2f2',500:'#ef4444',600:'#dc2626' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="flex min-h-screen">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="sidebar"></aside>
        <!-- 主内容区 -->
        <div class="flex-1 flex flex-col min-h-screen ml-64 transition-all duration-300">
            <!-- 顶部栏 -->
            <header id="header" class="header"></header>
            <!-- 内容区 -->
            <main id="main-content" class="flex-1 p-6"></main>
            <!-- 页脚 -->
            <footer class="text-center py-4 text-gray-400 text-sm border-t border-gray-100 bg-white">
                <p>由 <a href="https://with.woa.com/" style="color: #8A2BE2;" target="_blank">With</a> 通过自然语言生成</p>
            </footer>
        </div>
    </div>
    <!-- 模态框容器 -->
    <div id="modal-container"></div>
    <!-- 消息提示容器 -->
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
